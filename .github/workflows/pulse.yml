name: US Tech Pulse

on:
  # Every 15 min, weekdays, 13-21 UTC (covers US market hours across DST)
  schedule:
    - cron: '*/15 13-21 * * 1-5'
  # Manual trigger for testing
  workflow_dispatch:

# Minimal permissions for Pages deploy
permissions:
  contents: read
  pages: write
  id-token: write

# Avoid concurrent runs to prevent races
concurrency:
  group: pulse-pages
  cancel-in-progress: false

jobs:
  pulse:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scan
        run: python scan_web.py

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
